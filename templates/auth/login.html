{% extends "base.html" %}
{% block content %}

<section class="min-h-screen flex items-center justify-center px-4 py-24 relative">

    <!-- Decorative blob -->
    <div class="blob blob-2" style="opacity:0.4"></div>

    <div class="w-full max-w-md relative z-10 animate__animated animate__fadeInUp">

        <!-- Header -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block font-display font-extrabold text-3xl gradient-text mb-6">Zeuss</a>
            <h1 class="font-display font-bold text-2xl text-white mb-2">Iniciar Sessão</h1>
            <p class="text-white/40 text-sm">
                Acesso restrito — somente para o administrador.
            </p>
        </div>

        <!-- Card -->
        <div class="glass-card p-8">

            <!-- Lock icon -->
            <div class="flex justify-center mb-7">
                <div class="auth-icon-ring">
                    <i class="fas fa-key text-xl" style="color:var(--secondary)"></i>
                </div>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-5" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Endereço de E-mail</label>
                    <div class="input-icon-wrap">
                        <i class="fas fa-envelope input-icon"></i>
                        <input id="email" name="email" type="email" required
                               class="form-input pl-10"
                               placeholder="seu@email.com"
                               autocomplete="email">
                    </div>
                </div>

                <!-- Turnstile CAPTCHA -->
                <div class="flex justify-center py-1">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAAAbmEEY_fT7q5yqj" data-theme="dark"></div>
                </div>

                <button type="submit" class="btn-primary w-full justify-center py-3.5 glow-on-hover">
                    <i class="fas fa-paper-plane text-sm"></i>
                    Enviar código de verificação
                </button>
            </form>

            <p class="text-center text-xs text-white/25 mt-6">
                Um código OTP de 6 dígitos será enviado ao seu e-mail.
            </p>
        </div>

        <p class="text-center mt-6 text-xs text-white/20">
            <a href="/" class="hover:text-white/50 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i>Voltar ao portfólio
            </a>
        </p>
    </div>
</section>

<!-- Turnstile script -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

{% endblock %}
