{% extends "base.html" %}
{% block content %}

<section class="min-h-screen flex items-center justify-center px-4 py-24 relative">

    <div class="blob blob-1" style="opacity:0.35"></div>

    <div class="w-full max-w-md relative z-10 animate__animated animate__fadeInUp">

        <!-- Header -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block font-display font-extrabold text-3xl gradient-text mb-6">Zeuss</a>
            <h1 class="font-display font-bold text-2xl text-white mb-2">Verificar Código</h1>
            <p class="text-white/40 text-sm">
                Código enviado para <span class="text-white/65 font-medium">{{ email }}</span>
            </p>
        </div>

        <!-- Card -->
        <div class="glass-card p-8">

            <!-- Shield icon -->
            <div class="flex justify-center mb-7">
                <div class="auth-icon-ring">
                    <i class="fas fa-shield-halved text-xl" style="color:var(--secondary)"></i>
                </div>
            </div>

            <form action="{{ url_for('verify_code', email=email) }}" method="POST"
                  class="space-y-6" id="verifyForm">

                <!-- 6-digit OTP input -->
                <div>
                    <label class="form-label text-center block mb-3">Código de 6 dígitos</label>

                    <!-- Visual split inputs (cosmetic only — hidden real input) -->
                    <div class="otp-boxes" id="otpBoxes">
                        {% for i in range(6) %}
                        <div class="otp-box" data-index="{{ i }}"></div>
                        {% endfor %}
                    </div>

                    <!-- Real hidden input that gets submitted -->
                    <input type="text" id="codeHidden" name="code" required
                           maxlength="6" pattern="\d{6}"
                           class="form-input text-center tracking-[0.5em] font-display font-bold text-xl mt-4"
                           placeholder="______"
                           autocomplete="one-time-code"
                           inputmode="numeric">
                </div>

                <!-- Timer -->
                <div class="text-center text-xs text-white/35" id="timerWrap">
                    Código expira em <span id="countdown" class="font-display font-bold text-white/60">03:00</span>
                </div>

                <button type="submit" class="btn-primary w-full justify-center py-3.5 glow-on-hover">
                    <i class="fas fa-circle-check text-sm"></i>
                    Verificar Código
                </button>
            </form>

            <div class="mt-5 text-center">
                <a href="{{ url_for('login') }}" class="text-xs text-white/30 hover:text-white/60 transition-colors">
                    <i class="fas fa-rotate-left mr-1"></i>Reenviar código
                </a>
            </div>
        </div>

        <p class="text-center mt-6 text-xs text-white/20">
            <a href="/" class="hover:text-white/50 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i>Voltar ao portfólio
            </a>
        </p>
    </div>
</section>

<script>
/* OTP visual boxes sync with real input */
(function () {
    const boxes   = document.querySelectorAll('.otp-box');
    const real    = document.getElementById('codeHidden');

    function syncBoxes(val) {
        boxes.forEach((b, i) => {
            b.textContent   = val[i] || '';
            b.dataset.filled = val[i] ? '1' : '';
        });
    }

    real.addEventListener('input', () => {
        const digits = real.value.replace(/\D/g, '').slice(0, 6);
        real.value   = digits;
        syncBoxes(digits);
    });

    // Clicking a box focuses the real input
    boxes.forEach(b => b.addEventListener('click', () => real.focus()));
})();

/* Countdown timer — 3 minutes */
(function () {
    let secs = 180;
    const el = document.getElementById('countdown');
    if (!el) return;
    const iv = setInterval(() => {
        secs--;
        if (secs <= 0) {
            clearInterval(iv);
            el.textContent = '00:00';
            el.style.color = 'var(--accent)';
            return;
        }
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        el.textContent = `${m}:${s}`;
        if (secs <= 30) el.style.color = 'var(--accent)';
    }, 1000);
})();
</script>

{% endblock %}
