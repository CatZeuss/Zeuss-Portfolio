{% extends "base.html" %}

{% block content %}
<section class="py-20">
    <div class="container mx-auto px-6">
        <article class="max-w-3xl mx-auto">
            <header class="mb-8">
                <h1 class="text-4xl font-bold text-white gradient-text mb-4">{{ blog.title }}</h1>
                <div class="flex justify-between items-center text-gray-400">
                    <time datetime="{{ blog.created_at.isoformat() }}">
                        {{ blog.created_at.strftime('%B %d, %Y') }}
                    </time>
                    {% if current_user.is_authenticated and current_user.email == 'zeuss.developer@gmail.com' %}
                    <a href="{{ url_for('blog_edit', blog_id=blog.id) }}"
                       class="text-primary hover:text-secondary transition-colors duration-300">
                        Editar Blog
                    </a>
                    {% endif %}
                </div>
            </header>

            <div class="prose prose-invert max-w-none">
                {{ content_html|safe }}
            </div>

            <footer class="mt-8 pt-8 border-t border-gray-700">
                <a href="{{ url_for('blog_list') }}"
                   class="text-primary hover:text-secondary transition-colors duration-300">
                    ← Voltar para blogs
                </a>
            </footer>
        </article>
    </div>
</section>
{% endblock %}
