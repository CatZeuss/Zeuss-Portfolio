{% extends "base.html" %}

{% block content %}
<section class="py-20">
    <div class="container mx-auto px-6">
        <h2 class="text-3xl font-bold text-white gradient-text mb-8">
            {{ 'Editar blog' if blog else 'Criar blog' }}
        </h2>

        <form action="{{ url_for('blog_edit', blog_id=blog.id) if blog else url_for('blog_create') }}" 
              method="POST" class="space-y-6">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-300 mb-2">Título</label>
                <input type="text" id="title" name="title" required value="{{ blog.title if blog else '' }}"
                    class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>

            <div>
                <label for="category_id" class="block text-sm font-medium text-gray-300 mb-2">Categoria</label>
                <select id="category_id" name="category_id" required
                    class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">Selecione uma categoria</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" 
                        {{ 'selected' if blog and blog.category_id == category.id else '' }}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label for="content" class="block text-sm font-medium text-gray-300">Conteúdo (Markdown)</label>
                <div class="bg-white/5 rounded-lg p-4 mb-2">
                    <h4 class="text-sm font-medium text-gray-300 mb-2">Guia de Markdown</h4>
                    <div class="grid grid-cols-2 gap-4 text-sm text-gray-400">
                        <div>
                            <p># Heading 1</p>
                            <p>## Heading 2</p>
                            <p>**bold text**</p>
                            <p>*italic text*</p>
                        </div>
                        <div>
                            <p>[link text](URL)</p>
                            <p>- List item</p>
                            <p>1. Numbered item</p>
                            <p>`code`</p>
                        </div>
                    </div>
                </div>
                <textarea id="content" name="content" rows="20" required
                    class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-mono"
                    placeholder="Write your blog post content here using Markdown...">{{ blog.content if blog else '' }}</textarea>
                <div id="preview" class="mt-4 p-6 rounded-lg bg-white/5 prose prose-invert max-w-none">
                    <h3 class="text-gray-300 mb-4">Vista prévia</h3>
                    <div id="preview-content"></div>
                </div>
            </div>

            <div>
                <label for="status" class="block text-sm font-medium text-gray-300 mb-2">Estado</label>
                <select id="status" name="status" required
                    class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-600 text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="draft" {{ 'selected' if not blog or blog.status == 'draft' else '' }}>Rascunho</option>
                    <option value="published" {{ 'selected' if blog and blog.status == 'published' else '' }}>Postado</option>
                </select>
            </div>

            <div class="flex justify-end space-x-4">
                <a href="{{ url_for('blog_dashboard') }}"
                   class="px-6 py-2 border-2 border-gray-600 rounded-lg text-gray-300 hover:bg-gray-600 transition-colors">
                    Cancelar
                </a>
                <button type="submit"
                    class="glow-on-hover bg-gradient-to-r from-primary to-secondary text-white px-6 py-2 rounded-lg">
                    {{ 'Atualizar Blog' if blog else 'Criar Blog' }}
                </button>
            </div>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const contentTextarea = document.getElementById('content');
    const previewContent = document.getElementById('preview-content');

    function updatePreview() {
        const markdown = contentTextarea.value;
        const html = marked.parse(markdown);
        previewContent.innerHTML = html;
    }

    contentTextarea.addEventListener('input', updatePreview);
    updatePreview(); // Initial preview
});
</script>
{% endblock %}
